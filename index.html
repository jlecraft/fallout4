<!DOCTYPE html>
<html>
<head>
    <title>Fallout 4 Character Planner</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/site.css" />
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
</head>
<body>
    <nav class="navbar navbar-default">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">
                    <img alt="Brand" src="img/brand.jpg" style="height:20px;width:20px;">
                </a>
                <a class="navbar-brand" href="#">
                    Fallout 4 Character Planner
                </a>
                <form class="navbar-form navbar-left">
                    <a href="#" class="btn btn-danger btn-reset">Reset</a>
                </form>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3">
                <h3 class="special-heading">S.P.E.C.I.A.L.<span class="unspent-stats"></span></h3>
                <ul class="list-group list-special">
                    <li data-special="st" class="list-group-item clearfix">
                        <span class="bobblehead-wrap"><input type="checkbox" class="bobblehead-check" /><img src="img/bobblehead.png" class="bobblehead-img" title="Include +1 STRENGTH bonus from Bobblehead" /></span>
                        STRENGTH
                        <span class="pull-right">
                            <button class="btn btn-primary btn-xs btn-dec"><i class="glyphicon glyphicon-minus"></i></button>
                            <input type="number" min="1" max="10" class="form-control" value="1" />
                            <button class="btn btn-primary btn-xs btn-inc"><i class="glyphicon glyphicon-plus"></i></button>
                        </span>
                    </li>
                    <li data-special="pe" class="list-group-item clearfix">
                        <span class="bobblehead-wrap"><input type="checkbox" class="bobblehead-check" /><img src="img/bobblehead.png" class="bobblehead-img" title="Include +1 PERCEPTION bonus from Bobblehead" /></span>
                        PERCEPTION
                        <span class="pull-right">
                            <button class="btn btn-primary btn-xs btn-dec"><i class="glyphicon glyphicon-minus"></i></button>
                            <input type="number" min="1" max="10" class="form-control" value="1" />
                            <button class="btn btn-primary btn-xs btn-inc"><i class="glyphicon glyphicon-plus"></i></button>
                        </span>
                    </li>
                    <li data-special="en" class="list-group-item clearfix">
                        <span class="bobblehead-wrap"><input type="checkbox" class="bobblehead-check" /><img src="img/bobblehead.png" class="bobblehead-img" title="Include +1 ENDURANCE bonus from Bobblehead" /></span>
                        ENDURANCE
                        <span class="pull-right">
                            <button class="btn btn-primary btn-xs btn-dec"><i class="glyphicon glyphicon-minus"></i></button>
                            <input type="number" min="1" max="10" class="form-control" value="1" />
                            <button class="btn btn-primary btn-xs btn-inc"><i class="glyphicon glyphicon-plus"></i></button>
                        </span>
                    </li>
                    <li data-special="ch" class="list-group-item clearfix">
                        <span class="bobblehead-wrap"><input type="checkbox" class="bobblehead-check" /><img src="img/bobblehead.png" class="bobblehead-img" title="Include +1 CHARISMA bonus from Bobblehead" /></span>
                        CHARISMA
                        <span class="pull-right">
                            <button class="btn btn-primary btn-xs btn-dec"><i class="glyphicon glyphicon-minus"></i></button>
                            <input type="number" min="1" max="10" class="form-control" value="1" />
                            <button class="btn btn-primary btn-xs btn-inc"><i class="glyphicon glyphicon-plus"></i></button>
                        </span>
                    </li>
                    <li data-special="in" class="list-group-item clearfix">
                        <span class="bobblehead-wrap"><input type="checkbox" class="bobblehead-check" /><img src="img/bobblehead.png" class="bobblehead-img" title="Include +1 INTELLIGENCE bonus from Bobblehead" /></span>
                        INTELLIGENCE
                        <span class="pull-right">
                            <button class="btn btn-primary btn-xs btn-dec"><i class="glyphicon glyphicon-minus"></i></button>
                            <input type="number" min="1" max="10" class="form-control" value="1" />
                            <button class="btn btn-primary btn-xs btn-inc"><i class="glyphicon glyphicon-plus"></i></button>
                        </span>
                    </li>
                    <li data-special="ag" class="list-group-item clearfix">
                        <span class="bobblehead-wrap"><input type="checkbox" class="bobblehead-check" /><img src="img/bobblehead.png" class="bobblehead-img" title="Include +1 AGILITY bonus from Bobblehead" /></span>
                        AGILITY
                        <span class="pull-right">
                            <button class="btn btn-primary btn-xs btn-dec"><i class="glyphicon glyphicon-minus"></i></button>
                            <input type="number" min="1" max="10" class="form-control" value="1" />
                            <button class="btn btn-primary btn-xs btn-inc"><i class="glyphicon glyphicon-plus"></i></button>
                        </span>
                    </li>
                    <li data-special="lu" class="list-group-item clearfix">
                        <span class="bobblehead-wrap"><input type="checkbox" class="bobblehead-check" /><img src="img/bobblehead.png" class="bobblehead-img" title="Include +1 LUCK bonus from Bobblehead" /></span>
                        LUCK
                        <span class="pull-right">
                            <button class="btn btn-primary btn-xs btn-dec"><i class="glyphicon glyphicon-minus"></i></button>
                            <input type="number" min="1" max="10" class="form-control" value="1" />
                            <button class="btn btn-primary btn-xs btn-inc"><i class="glyphicon glyphicon-plus"></i></button>
                        </span>
                    </li>
                </ul>
                <h4>Required Level: <span class="required-level-perks">1</span> (<span class="required-level-points">1</span>)</h4>
                <h4>Free Levels: <span class="free-levels">0</span></h4>
                <div class="summary"></div>
            </div>
            <div class="col-md-9">
                <h3>Perks</h3>
                <table class="table"></table>
            </div>
        </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js"></script>
    <script src="js/perks.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
